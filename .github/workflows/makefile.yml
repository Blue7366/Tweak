name: Compile Tweak to Dylib
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: brew install ldid xz

      - name: Setup Theos Compiler Engine
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Clone Patched iOS SDKs Directly
        run: |
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Compile Code to Native Binary
        run: |
          export THEOS=~/theos
          make clean
          # The '|| true' ensures the workflow continues even if the final package step lacks a control file
          make package FINALPACKAGE=1 || true

      - name: Extract Compiled Dylib File
        run: |
          mkdir -p output_dylib
          # Safely copy the compiled universal arm64/arm64e binaries out of the staging folders
          cp .theos/obj/*.dylib output_dylib/ 2>/dev/null || cp .theos/obj/debug/*.dylib output_dylib/ || cp staging/Library/MobileSubstrate/DynamicLibraries/*.dylib output_dylib/ 2>/dev/null || true

      - name: Upload Finished Dylib Website Link
        uses: actions/upload-artifact@v4
        with:
          name: HelloGuestAudioFix-Dylib
          path: output_dylib/
